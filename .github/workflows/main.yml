name: Build DOS Executable

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Open Watcom
        uses: open-watcom/setup-watcom@v1

      - name: Verify Watcom installation
        run: |
          echo "WATCOM=$WATCOM"
          which wcl
          wcl -h

      - name: Build Rakuzitu
        run: |
          source "$WATCOM/owsetenv.sh"

          wcl -bt=dos -ml -0 -ox -s -fm=rakuzitu \
            Rakuzitu.c gameplay.c video.c timer.c keyboard.c \
            player_assets.c opponent_assets.c gameover_asset.c

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: rakuzitu-dos-build
          path: |
            *.exe
            *.map
